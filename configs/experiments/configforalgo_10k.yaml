rag_search_space:
  rewriter:
    model_url: ["http://localhost:9000/v1"]
    prompt_template_id: ["1", "2", "3"]

  chunking:
    chunk_size: [512, 1024]
    chunk_overlap: [0, 128]

  retrieve:
    model_url: ["models/all-MiniLM-L12-v2", "models/all-MiniLM-L6-v2"]
    topk: [1, 3, 5, 10]
    bm25_weight: [0.0, 0.25, 0.5]

  reranker:
    model_url: ["models/ms-marco-TinyBERT-L2-v2", "models/ms-marco-MiniLM-L6-v2"]
    topk: [1, 3, 5]

  pruner:
    model_url: ["http://localhost:9000/v1"]
    prompt_template_id: ["1", "2", "3"]

  generator:
    model_url: ["http://localhost:9000/v1"]

eval_metrics:
  enabled: "F1,ROUGE-L,BLEU,METEOR"
